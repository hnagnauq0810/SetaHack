version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'Asia/Ho_Chi_Minh'
    open-pull-requests-limit: 5
    groups:
      docker:
        patterns:
          - 'docker/*'
      aws:
        patterns:
          - 'aws-actions/*'
      sigstore-anchore:
        patterns:
          - 'sigstore/*'
          - 'anchore/*'
          - 'aquasecurity/*'
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: 'chore(ci)'
      include: scope
