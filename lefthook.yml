assert_lefthook_installed: true
min_version: 1.10.0

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,jsx,ts,tsx,json,jsonc}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      run: pnpm typecheck
    depcruise:
      run: pnpm depcruise
    biome-ci:
      run: pnpm biome ci .
