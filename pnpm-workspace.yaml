packages:
  - "apps/*"
  - "packages/*"
  - "sdks/*"
overrides:
  # @better-auth/core@1.6.11 peer-requires better-call@1.3.5, but @better-auth/cli@1.4.21
  # (no 1.6.x published) drags in better-call@1.1.8, which pnpm mis-links into core@1.6.11
  # → "kAPIErrorHeaderSymbol" missing export crash at server boot. Force a single version.
  better-call: 1.3.5
  # Hold these @radix-ui packages one minor back: their next release ships a GLOBAL
  # `declare module 'react' { interface CSSProperties { [`--radix-${string}`]: ... } }`
  # augmentation that leaks into every CSSProperties in the app and makes
  # @hello-pangea/dnd's DraggableStyle no longer assignable to a `style` prop. Pinned
  # to the last pre-augmentation version (direct + transitive) until dnd's types catch up.
  "@radix-ui/react-accordion": 1.2.12
  "@radix-ui/react-hover-card": 1.1.15
  "@radix-ui/react-menu": 2.1.16
  "@radix-ui/react-navigation-menu": 1.2.14
  "@radix-ui/react-popover": 1.1.15
  "@radix-ui/react-popper": 1.2.8
  "@radix-ui/react-scroll-area": 1.2.10
  "@radix-ui/react-select": 2.2.6
  "@radix-ui/react-slider": 1.3.6
  "@radix-ui/react-tooltip": 1.2.8
  happy-dom: 20.9.0
allowBuilds:
  '@prisma/client': true
  better-sqlite3: true
  cpu-features: true
  esbuild: true
  lefthook: true
  msw: true
  protobufjs: true
  ssh2: true
minimumReleaseAgeExclude:
  - '@aws-sdk/*'
  - '@mastra/*'
  - '@assistant-ui/*'
  - '@turbo/*'
  - assistant-stream
  - nodemailer
  - react-email
  - turbo
