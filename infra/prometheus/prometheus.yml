# Prometheus configuration for the Seta local/self-host stack.
# Scrapes OTEL Prometheus endpoints exposed by the server and worker containers.
# Each app listens on port 9464 (OTEL_PROMETHEUS_PORT default).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: seta-server
    static_configs:
      - targets: ['server:9464']
        labels:
          service: seta-server

  - job_name: seta-worker
    static_configs:
      - targets: ['worker:9464']
        labels:
          service: seta-worker
