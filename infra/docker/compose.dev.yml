# Local dev stack for seta-agent-platform.
#
name: agent-platform

services:
  postgres:
    image: pgvector/pgvector:pg17-trixie
    container_name: seta-ap-postgres-dev
    ports:
      - "5542:5432"
    environment:
      POSTGRES_USER: seta
      POSTGRES_PASSWORD: seta
      POSTGRES_DB: seta
    volumes:
      - seta-ap-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seta -d seta"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: seta-ap-redis-dev
    ports:
      - "6489:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - seta-ap-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: seta-ap-otel-dev
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4428:4318" # OTLP HTTP
      - "4427:4317" # OTLP gRPC
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/jaeger:2.6.0
    container_name: seta-ap-jaeger-dev
    ports:
      - "16696:16686" # Jaeger UI
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # clamav:
  #   image: clamav/clamav:1.4
  #   container_name: seta-ap-clamav-dev
  #   # Port offset +10 to coexist with other workstation stacks.
  #   ports:
  #     - "3320:3310"
  #   healthcheck:
  #     test: ["CMD", "clamdcheck.sh"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 180s

  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: seta-ap-prometheus-dev
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=3d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    # host.docker.internal is used in prometheus.dev.yml to reach the local
    # pnpm dev server (port 9464) and worker (port 9465).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    volumes:
      - ../../infra/prometheus/prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro
      - seta-ap-prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:12.0.1
    container_name: seta-ap-grafana-dev
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3100:3000"   # offset from 3000 (often used by pnpm dev server)
    volumes:
      - ../../infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - seta-ap-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  seta-ap-postgres-data:
  seta-ap-redis-data:
  seta-ap-prometheus-data:
  seta-ap-grafana-data:
